<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Fruit Ninja</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a0a28;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    #game-wrap {
      position: relative;
      display: inline-block;
    }

    canvas#game-canvas {
      display: block;
      cursor: crosshair;
      touch-action: none;
      max-width: 100vw;
      max-height: 90vh;
    }

    /* Camera PIP — bottom-left, same style as runner */
    #pip {
      position: absolute;
      bottom: 10px;
      left: 12px;
      width: 180px;
      height: 135px;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid rgba(212, 49, 161, 0.5);
      box-shadow: 0 0 12px rgba(212, 49, 161, 0.3), 0 4px 20px rgba(0,0,0,0.7);
    }
    #webcam {
      position: absolute;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    #overlay {
      position: absolute;
      width: 100%; height: 100%;
      transform: scaleX(-1);
    }

    #status {
      font-size: 0.72rem;
      color: #985DC7;
      letter-spacing: 0.08em;
      min-height: 1.2rem;
      margin-top: 6px;
      text-shadow: 0 0 8px rgba(152,93,199,0.4);
    }
    #status.ready { color: #6dffb3; text-shadow: 0 0 8px rgba(109,255,179,0.4); }
    #status.error { color: #f43f5e; text-shadow: 0 0 8px rgba(244,63,94,0.4); }
  </style>
</head>
<body>
  <div id="game-wrap">
    <canvas id="game-canvas"></canvas>
    <div id="pip">
      <video id="webcam" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
    </div>
  </div>
  <div id="status">Initialising camera…</div>
  <script type="module" src="/src/games/fruitninja.js"></script>
</body>
</html>
