<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movement Runner</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #060b14;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 12px;
      font-family: system-ui, sans-serif;
      color: #e0e0e0;
    }

    h1 {
      font-size: 0.9rem;
      letter-spacing: 0.15em;
      color: #4a6fa5;
      text-transform: uppercase;
    }

    /* ── Game canvas ── */
    #game-wrap {
      position: relative;
      width: 800px;
      height: 400px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(80,140,255,0.15);
    }
    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* ── Webcam PiP (bottom-right of game) ── */
    #pip {
      position: absolute;
      bottom: 10px;
      left: 12px;
      width: 180px;
      height: 135px;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 2px 12px rgba(0,0,0,0.5);
    }
    #webcam {
      position: absolute;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    #overlay {
      position: absolute;
      width: 100%; height: 100%;
      transform: scaleX(-1);
    }

    /* ── Status bar ── */
    #status {
      font-size: 0.75rem;
      color: #4a6fa5;
      letter-spacing: 0.05em;
      min-height: 1.1rem;
    }
    #status.ready  { color: #55efc4; }
    #status.error  { color: #e05252; }
  </style>
</head>
<body>
  <h1>Movement Runner</h1>

  <div id="game-wrap">
    <canvas id="game-canvas" width="800" height="400"></canvas>

    <div id="pip">
      <video id="webcam" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
    </div>
  </div>

  <div id="status">Initialising…</div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
