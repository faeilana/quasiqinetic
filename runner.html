<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movement Runner</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: radial-gradient(ellipse at 50% 30%, #0d0826 0%, #04020f 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 14px;
      font-family: 'Courier New', monospace;
      color: #c4b5fd;
    }

    h1 {
      font-size: 0.85rem;
      letter-spacing: 0.22em;
      color: #7c3aed;
      text-transform: uppercase;
      text-shadow: 0 0 18px rgba(124,58,237,0.7);
    }

    /* ── Game canvas ── */
    #game-wrap {
      position: relative;
      width: 800px;
      height: 400px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(124,58,237,0.35);
      box-shadow:
        0 0 0 1px rgba(124,58,237,0.15),
        0 0 30px rgba(124,58,237,0.35),
        0 0 80px rgba(60,20,120,0.4),
        inset 0 0 30px rgba(0,0,0,0.5);
    }
    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    /* 2D HUD drawn on top of the WebGL canvas */
    #hud-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    /* ── Webcam PiP ── */
    #pip {
      position: absolute;
      bottom: 10px;
      left: 12px;
      width: 180px;
      height: 135px;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid rgba(124,58,237,0.4);
      box-shadow: 0 0 12px rgba(124,58,237,0.3), 0 4px 20px rgba(0,0,0,0.7);
    }
    #webcam {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: contain;
      transform: scaleX(-1);
      z-index: 1;
    }
    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: contain;
      transform: scaleX(-1);
      pointer-events: none;
      z-index: 2;
    }

    /* ── Status bar ── */
    #status {
      font-size: 0.72rem;
      color: #5b21b6;
      letter-spacing: 0.08em;
      min-height: 1.1rem;
      text-shadow: 0 0 8px rgba(91,33,182,0.5);
    }
    #status.ready  { color: #34d399; text-shadow: 0 0 8px rgba(52,211,153,0.5); }
    #status.error  { color: #f43f5e; text-shadow: 0 0 8px rgba(244,63,94,0.5); }
  </style>
</head>
<body>
  <h1>Movement Runner</h1>

  <div id="game-wrap">
    <canvas id="game-canvas" width="800" height="400"></canvas>
    <canvas id="hud-canvas"  width="800" height="400"></canvas>

    <div id="pip">
      <video id="webcam" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
    </div>
  </div>

  <div style="display:flex;align-items:center;justify-content:space-between;width:800px">
    <div id="status">Initialising…</div>
    <a href="/dashboard.html" style="font-size:0.7rem;letter-spacing:0.1em;color:#5b21b6;text-decoration:none;font-family:'Courier New',monospace" target="_blank">wellness dashboard →</a>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
