<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Motion Runner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: linear-gradient(to bottom, #ffeed6 0%, #ffc696 100%);
    font-family: "Baloo 2", sans-serif;
    cursor: pointer;
    user-select: none;
  }

  h1 {
    font-family: "Luckiest Guy", cursive;
    font-size: 88px;
    margin: 0;
    letter-spacing: 2px;
    color: #ff9646;
    -webkit-text-stroke: 4px #6e3b20;
    paint-order: stroke fill;
    text-shadow: 0 6px 0 #6e3b20, 0 10px 14px rgba(0, 0, 0, 0.25);
    animation: pulse 1.4s ease-in-out infinite alternate;
  }

  .subtitle {
    font-weight: 700;
    font-size: 22px;
    color: #6e4b3c;
    margin-top: 6px;
  }

  .hint {
    font-weight: 500;
    font-size: 18px;
    color: #a0735f;
    margin-top: 70px;
    animation: blink 1.3s steps(1) infinite;
  }

  @keyframes pulse {
    from { color: #ff9646; }
    to   { color: #ff5a5a; }
  }

  @keyframes blink {
    0%, 49%   { opacity: 1; }
    50%, 100% { opacity: 0; }
  }
</style>
</head>
<body onclick="goToMenu()">
  <h1>MOTION RUNNER</h1>
  <div class="subtitle">Jump. Lean. Run. Controlled by YOU.</div>
  <div class="hint">Press ENTER or click to continue</div>

  <script>
    function goToMenu() {
      window.location.href = "menu.html";
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.code === "Space") goToMenu();
    });
  </script>
</body>
</html>
