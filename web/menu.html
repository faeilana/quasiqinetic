<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Motion Runner - Choose Your Run</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Baloo+2:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100vh;
    background: linear-gradient(to bottom, #ffeed6 0%, #ffc696 100%);
    font-family: "Baloo 2", sans-serif;
    user-select: none;
  }

  h1 {
    font-family: "Luckiest Guy", cursive;
    font-size: 48px;
    margin: 60px 0 0;
    letter-spacing: 1px;
    color: #ff9646;
    -webkit-text-stroke: 3px #6e3b20;
    paint-order: stroke fill;
    text-shadow: 0 4px 0 #6e3b20, 0 8px 10px rgba(0, 0, 0, 0.2);
  }

  .cards {
    display: flex;
    gap: 50px;
    margin-top: 70px;
  }

  .card {
    width: 240px;
    height: 320px;
    border-radius: 10px;
    position: relative;
    cursor: pointer;
    box-sizing: border-box;
    border: 2px solid #46494c;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    overflow: hidden;
  }

  .card .label {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 50px;
    background: rgba(0, 0, 0, 0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: 700;
    font-size: 20px;
  }

  .card.selected {
    border: 4px solid #ffc400;
    box-shadow: 0 0 0 6px rgba(255, 196, 0, 0.35);
    transform: translateY(-4px);
  }

  #train-station { background: linear-gradient(to bottom, #121622 0%, #282e40 100%); }
  #woods         { background: linear-gradient(to bottom, #163026 0%, #3a6e4a 100%); }
  #mountain      { background: linear-gradient(to bottom, #82bee6 0%, #e1f0f5 100%); }

  .hint {
    font-weight: 500;
    font-size: 16px;
    color: #a0735f;
    margin-top: auto;
    margin-bottom: 40px;
  }
</style>
</head>
<body>
  <h1>Choose Your Run</h1>

  <div class="cards">
    <div class="card selected" id="train-station">
      <div class="label">Train Station</div>
    </div>
    <div class="card" id="woods">
      <div class="label">The Woods</div>
    </div>
    <div class="card" id="mountain">
      <div class="label">The Mountain</div>
    </div>
  </div>

  <div class="hint">&larr; &rarr; or hover to choose &nbsp;&nbsp; ENTER / click to play &nbsp;&nbsp; ESC to go back</div>

  <script>
    const cards = Array.from(document.querySelectorAll(".card"));
    let selected = 0;

    function select(index) {
      selected = (index + cards.length) % cards.length;
      cards.forEach((card, i) => card.classList.toggle("selected", i === selected));
    }

    function launch(card) {
      // Placeholder: level screens aren't ported to HTML yet.
      console.log("-> level:", card.id);
    }

    cards.forEach((card, i) => {
      card.addEventListener("mouseenter", () => select(i));
      card.addEventListener("click", () => launch(cards[selected]));
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft" || e.key === "a") select(selected - 1);
      else if (e.key === "ArrowRight" || e.key === "d") select(selected + 1);
      else if (e.key === "Enter" || e.code === "Space") launch(cards[selected]);
      else if (e.key === "Escape") window.location.href = "landing.html";
    });
  </script>
</body>
</html>
